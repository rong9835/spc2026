<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style></style>
</head>
<body>
    <h1>외부 요청 테스트</h1>
    <input type="number" id="uid">
    <button id="loadBtn">데이터 요청</button>
    <button id="saveBtn">데이터 쓰기</button>
    <button id="delBtn">데이터 삭제</button>
    <button id="modBtn">데이터 수정</button>
    <div id="result"><!--응답 데이터를 표시할곳--></div>
    <script>
        /* PUT 정보 요청 */
        document.getElementById('modBtn').addEventListener('click', () => {
            const userid = document.getElementById('uid').value;
            console.log("수정할ID: ", userid);

            const putData = {
                title: 'hello',
                body: 'world',
                userId: userid,
                id: userid
            };

            fetch(`https://jsonplaceholder.typicode.com/posts/${userid}`, {
                method: 'PUT',
                headers: {
                    'Content-type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify(putData)
            })
                .then(resp => resp.json())
                .then(data => console.log(data))
        })

        /* DELETE 정보 요청 */
        document.getElementById('delBtn').addEventListener('click', () => {
            const userid = document.getElementById('uid').value;
            console.log("삭제할ID: ", userid);
            fetch(`https://jsonplaceholder.typicode.com/posts/${userid}`, {
                method: 'DELETE'
            });
        })

        /* POST 정보 요청 */
        document.getElementById('saveBtn').addEventListener('click', () => {
            const postData = {
                title: 'hello',
                body: 'world',
                userId: 1
            };

            /* 이 주소(보내야 할 주소)는 원작자의 문서를 통해서 확인 */
            fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                headers: {
                    'Content-type': 'application/json; charset=UTF-8'
                },
                body: JSON.stringify(postData)
            })
                .then(resp => resp.json())
                .then(data => console.log(data))
        })

        /* GET 정보 요청 */
        document.getElementById('loadBtn').addEventListener('click', () => {
            const userid = document.getElementById('uid').value;
            console.log("사용자id:", userid);

            fetch(`https://jsonplaceholder.typicode.com/users/${userid}`)
                .then((response) => response.json())
                .then((data) => {
                    console.log(data);
                    const resultDiv = document.getElementById('result');
                    resultDiv.innerHTML = `
                        <ul>
                            <li>사용자ID: ${data.id}</li>
                            <ul>
                                <li>이름: ${data.name}</li>
                                <li>전화번호: ${data.phone}</li>
                                <li>웹사이트: ${data.website}</li>
                            </ul>
                        </ul>
                    `;
                })
                .catch((error) => {
                    console.log("위에 fetch를 처리하고 가공하는 과정중 어딘가에서 오류가 났음: ", error)
                })
        });
    </script>
</body>
</html>
