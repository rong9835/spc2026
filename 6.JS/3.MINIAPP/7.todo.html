<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>오늘 할일 (todo 리스트)</h1>
    <input type="text " id="new-todo" placeholder="할일 입력" />
    <button id="add-todo">추가</button>
    <ul id="todo-list">
      <!-- 할일들이 표시될곳 -->
    </ul>
    <script>
      // 1. 버튼이 클릭되면...
      // 2. 거기 값 읽어와서 .. ul아래 li추가하기
      const newTodoInput = document.getElementById('new-todo');
      const addTodoBtn = document.getElementById('add-todo');
      const todoList = document.getElementById('todo-list');

      function addTodo() {
        let addLi = document.createElement('li');
        addLi.textContent = newTodoInput.value;
        todoList.appendChild(addLi);
        addLi.addEventListener('click', completeTodo);
        let deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'x';
        addLi.appendChild(deleteBtn);
      }
      function completeTodo(e) {
        if (e.target.style.textDecoration === 'line-through') {
          e.target.style.textDecoration = 'none';
        } else {
          e.target.style.textDecoration = 'line-through';
        }
      }

      function deleteTodo() {}

      addTodoBtn.addEventListener('click', addTodo);
    </script>
  </body>
</html>
