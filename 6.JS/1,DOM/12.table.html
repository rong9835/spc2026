<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      table {
        border-collapse: collapse;
      }
      td {
        padding: 10px;
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <td>셀1</td>
        <td>셀2</td>
        <td>셀3</td>
      </tr>
      <tr>
        <td>셀4</td>
        <td>셀5</td>
        <td>셀6</td>
      </tr>
      <tr>
        <td>셀7</td>
        <td>셀8</td>
        <td>셀9</td>
      </tr>
    </table>

    <button onclick="changeOddcells()">홀수셀 색상 변경</button>
    <button onclick="changeEnevcells()">짝수셀 색상 변경</button>

    <script>
      function changeOddcells() {
        const cells = document.getElementsByTagName("td");
        for (let i = 0; i < cells.length; i++) {
          if (i % 2 == 0) {
            cells[i].style.backgroundColor = "lightgreen";
          }
        }
      }
      function changeEnevcells() {
        erySelectorAll("td");

        const cells = document.getElementsByTagName("td");

        Array.from(cells).forEach((cell, index) => {
          if (index % 2 == 1) {
            cell.style.backgroundColor = "pink";
          }
        });
      }
    </script>
  </body>
</html>
