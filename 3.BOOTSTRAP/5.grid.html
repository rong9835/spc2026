<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>반응형 컨테이너 예제</title>
    <!-- Bootstrap CSS CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container">
      <h4 class="text-center my-4">더 디테일한 반응형 컨테이너 예제</h4>

      <!-- xs: 576px 미만에서만 보임 -->
      <div class="d-block d-sm-none bg-success text-white p-3 text-center">
        아주 작은 화면에서만 보입니다 (576px 미만)
      </div>

      <!-- sm: 576px 이상 ~ 768px 미만에서만 보임 -->
      <div
        class="d-none d-sm-block d-md-none bg-primary text-white p-3 text-center"
      >
        작은 화면에서만 보입니다 (576px 이상 ~ 768px 미만)
      </div>

      <!-- md: 768px 이상 ~ 992px 미만에서만 보임 -->
      <div
        class="d-none d-md-block d-lg-none bg-info text-white p-3 text-center"
      >
        중간 화면에서만 보입니다 (768px 이상 ~ 992px 미만)
      </div>

      <!-- lg: 992px 이상 ~ 1200px 미만에서만 보임 -->
      <div
        class="d-none d-lg-block d-xl-none bg-warning text-dark p-3 text-center"
      >
        큰 화면에서만 보입니다 (992px 이상 ~ 1200px 미만)
      </div>

      <!-- xl: 1200px 이상에서만 보임 -->
      <div class="d-none d-xl-block bg-danger text-white p-3 text-center">
        아주 큰 화면에서만 보입니다 (1200px 이상)
      </div>
    </div>
  </body>
</html>
