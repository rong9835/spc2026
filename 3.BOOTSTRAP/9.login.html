<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f4f4f5, #e4e4e7);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        width: 35vw;
        min-width: 300px;
        max-width: 480px;
        border-radius: 1rem;
        box-shadow:
          12px 12px 40px rgba(0, 0, 0, 0.45),
          20px 20px 60px rgba(0, 0, 0, 0.25);
      }

      .form-label {
        font-size: 0.7rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #71717a;
      }

      .form-control {
        background-color: #fafafa;
        border: 1px solid #e4e4e7;
        border-radius: 0.75rem;
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        color: #27272a;
        transition: all 0.2s;
      }

      .form-control::placeholder {
        color: #d4d4d8;
      }

      .form-control:focus {
        background-color: #fff;
        border-color: #18181b;
        box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.08);
      }

      .btn-login {
        background-color: #18181b;
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        padding: 0.75rem;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.35);
        transition:
          background-color 0.15s,
          transform 0.1s;
      }

      .btn-login:hover {
        background-color: #3f3f46;
        color: #fff;
      }

      .btn-login:active {
        transform: scale(0.98);
      }

      .form-check-input:checked {
        background-color: #18181b;
        border-color: #18181b;
      }

      .link-muted {
        font-size: 0.75rem;
        color: #a1a1aa;
        text-decoration: none;
      }

      .link-muted:hover {
        color: #3f3f46;
      }

      .signup-link {
        color: #3f3f46;
        font-weight: 500;
      }

      .signup-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-card bg-white p-5">
      <!-- 헤더 -->
      <div class="mb-4">
        <h2
          class="fw-semibold text-dark mb-1"
          style="font-size: 1.5rem; letter-spacing: -0.02em"
        >
          로그인
        </h2>
        <p class="mb-0 link-muted">계정에 접속하세요</p>
      </div>

      <!-- 폼 -->
      <div class="d-flex flex-column gap-3">
        <!-- Username -->
        <div>
          <label class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            placeholder="아이디를 입력하세요"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            placeholder="비밀번호를 입력하세요"
          />
        </div>

        <!-- 옵션 -->
        <div class="d-flex align-items-center justify-content-between pt-1">
          <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label link-muted" for="remember"
              >로그인 상태 유지</label
            >
          </div>
          <a href="#" class="link-muted">비밀번호 찾기</a>
        </div>

        <!-- 로그인 버튼 -->
        <button class="btn btn-login w-100 mt-1">로그인</button>
      </div>

      <!-- 회원가입 -->
      <p
        class="text-center mb-0 mt-4"
        style="font-size: 0.75rem; color: #a1a1aa"
      >
        계정이 없으신가요?
        <a href="#" class="signup-link">회원가입</a>
      </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
