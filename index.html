<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>자리배치도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #f2efe9;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 20px;
  }

  h1 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }

  .layout { display: flex; gap: 20px; align-items: flex-start; }

  .sidebar {
    width: 210px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 12px;
  }

  .panel-title {
    font-size: 11px;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
  }

  input[type=text] {
    padding: 5px 8px;
    font-size: 13px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
    color: #1a1a1a;
    font-family: inherit;
  }

  .name-row { display: flex; gap: 5px; margin-bottom: 7px; }
  .name-row input { flex: 1; min-width: 0; }

  .student-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-height: 160px;
    overflow-y: auto;
  }

  .chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 8px;
    background: #f5f3ee;
    border: 1px solid #e5e2da;
    border-radius: 6px;
    font-size: 13px;
    user-select: none;
  }

  .chip-del { font-size: 14px; color: #bbb; cursor: pointer; }
  .chip-del:hover { color: #e24b4a; }

  textarea.bulk {
    width: 100%;
    padding: 5px 8px;
    font-size: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
    color: #1a1a1a;
    resize: none;
    font-family: inherit;
    margin-top: 3px;
  }

  .btn {
    width: 100%;
    padding: 7px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #ddd;
    border-radius: 7px;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    margin-top: 5px;
  }
  .btn:hover { background: #f2efe9; }
  .btn.primary { background: #1a1a1a; color: #fff; border-color: transparent; }
  .btn.primary:hover { background: #333; }
  .btn.danger { background: #fff0f0; color: #c0392b; border-color: #f5c6c6; }

  .board-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 0;
  }

  .label-bar {
    text-align: center;
    padding: 7px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 7px;
    font-size: 12px;
    color: #777;
    font-weight: 600;
    letter-spacing: 0.06em;
  }

  .zones-wrapper {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: flex-start;
  }

  .zone { display: flex; flex-direction: column; gap: 4px; }

  .seat-row {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
  }

  .seat {
    width: 66px;
    height: 36px;
    border: 1px solid #c8c5bc;
    border-radius: 5px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #1a1a1a;
    cursor: pointer;
    user-select: none;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    padding: 0 4px;
    transition: all 0.1s;
    flex-shrink: 0;
  }

  .seat.empty {
    background: #f9f8f5;
    border-color: #e0ddd5;
    color: transparent;
    cursor: default;
  }

  .seat:not(.empty):hover { border-color: #888; background: #f5f3ee; }

  .seat.selected {
    border: 2px solid #2563eb;
    background: #eff6ff;
    color: #1d4ed8;
  }

  .seat.drag-over {
    border: 2px solid #16a34a;
    background: #f0fdf4;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 4px;
  }

  .lbl-teacher {
    padding: 7px 22px;
    background: #4a90d9;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    border-radius: 7px;
  }

  .lbl-screen {
    padding: 7px 44px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 7px;
    font-size: 12px;
    color: #777;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .status {
    text-align: center;
    font-size: 12px;
    color: #888;
    min-height: 18px;
  }

  .hint { font-size: 12px; color: #888; line-height: 1.8; }
</style>
</head>
<body>

<h1>📋 자리배치도</h1>

<div class="layout">

  <div class="sidebar">

    <div class="panel">
      <div class="panel-title">학생 명단 (<span id="count">0</span>명)</div>
      <div class="name-row">
        <input type="text" id="name-input" placeholder="이름 입력 후 Enter" maxlength="10"/>
      </div>
      <div class="student-list" id="student-list"></div>
      <div style="margin-top:9px;">
        <div class="panel-title" style="margin-bottom:3px;">일괄 입력 (줄바꿈 구분)</div>
        <textarea class="bulk" id="bulk" rows="4" placeholder="홍길동&#10;김철수&#10;이영희"></textarea>
        <button class="btn" onclick="bulkAdd()">일괄 추가</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">배치</div>
      <button class="btn primary" onclick="randomShuffle()">🎲 랜덤 배치</button>
      <button class="btn danger" onclick="clearSeats()">초기화</button>
    </div>

    <div class="panel">
      <div class="panel-title">수동 배치</div>
      <div class="hint">
        ① 자리 클릭 → 파란색 선택<br/>
        ② 다른 자리 클릭 → 교환<br/>
        또는 <strong>드래그 앤 드롭</strong>
      </div>
    </div>

  </div>

  <div class="board-area">
    <div class="label-bar">뒤쪽 유리창</div>
    <div class="zones-wrapper" id="zones-wrapper"></div>
    <div class="bottom-bar">
      <div class="lbl-teacher">강사</div>
      <div class="lbl-screen">앞쪽 스크린</div>
    </div>
    <div class="status" id="status"></div>
  </div>

</div>

<script>
  const zoneConfig = {
    left:   [2, 2, 1, 1],
    center: [3, 3, 3, 3, 2],
    right:  [2, 2, 2, 2, 2],
  };

  let seats = {};
  let students = [
    '조윤', '조은결', '권태현', '김성호', '한혜경', '유지산',
    '이춘우', '최준호', '이서우', '김민정', '박지우', '박은빈',
    '진미경', '박상우', '조용민', '김민정', '이종혁', '김유선',
    '심정호', '이태경',
    '황동건', '이상욱', '원가희', '신혜진', '김선희', '한은태',
    '박초롱', '박준하', '채란', '이민지'
  ];
  let selected = null;
  let dragSrc  = null;

  function init() {
    resetSeats();
    renderAll();
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addStudent();
    });
  }

  function resetSeats() {
    seats = {
      left: [
        ['조윤', '조은결'],
        ['권태현', '김성호'],
        ['한혜경'],
        ['유지산']
      ],
      center: [
        ['이춘우', '최준호', '이서우'],
        ['김민정', '박지우', '박은빈'],
        ['진미경', '박상우', '조용민'],
        ['김민정', '이종혁', '김유선'],
        ['심정호', '이태경']
      ],
      right: [
        ['황동건', '이상욱'],
        ['원가희', '신혜진'],
        ['김선희', '한은태'],
        ['박초롱', '박준하'],
        ['채란', '이민지']
      ]
    };
  }

  function addStudent() {
    const el = document.getElementById('name-input');
    const name = el.value.trim();
    if (!name) return;
    students.push(name);
    el.value = '';
    renderSidebar();
  }

  function bulkAdd() {
    const text = document.getElementById('bulk').value;
    const names = text.split('\n').map(n => n.trim()).filter(n => n);
    if (!names.length) { setStatus('추가할 이름이 없어요'); return; }
    students.push(...names);
    document.getElementById('bulk').value = '';
    renderSidebar();
    setStatus(`${names.length}명 추가됨`);
  }

  function removeStudent(idx) {
    const name = students[idx];
    students.splice(idx, 1);
    let removed = false;
    ['left', 'center', 'right'].forEach(zone => {
      seats[zone] = seats[zone].map(row => row.map(c => {
        if (!removed && c === name) { removed = true; return null; }
        return c;
      }));
    });
    renderSidebar();
    renderBoard();
  }

  function randomShuffle() {
    if (!students.length) { setStatus('먼저 학생을 추가해주세요'); return; }

    const slots = [];
    ['left', 'center', 'right'].forEach(zone => {
      seats[zone].forEach((row, ri) => {
        row.forEach((_, ci) => slots.push({ zone, ri, ci }));
      });
    });

    const arr = [...students];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    ['left', 'center', 'right'].forEach(zone => {
      seats[zone] = seats[zone].map(row => row.map(() => null));
    });

    arr.forEach((name, i) => {
      if (i < slots.length) {
        const { zone, ri, ci } = slots[i];
        seats[zone][ri][ci] = name;
      }
    });

    selected = null;
    renderBoard();
    setStatus('🎲 랜덤 배치 완료!');
  }

  function clearSeats() {
    ['left', 'center', 'right'].forEach(zone => {
      seats[zone] = seats[zone].map(row => row.map(() => null));
    });
    selected = null;
    renderBoard();
    setStatus('초기화됐어요');
  }

  function seatClick(zone, ri, ci) {
    const name = seats[zone][ri][ci];
    if (!selected) {
      if (!name) { setStatus('빈 자리예요 — 사람이 있는 자리를 먼저 선택하세요'); return; }
      selected = { zone, ri, ci };
      renderBoard();
      setStatus(`"${name}" 선택 — 바꿀 자리를 클릭하세요 (같은 자리 재클릭 시 해제)`);
    } else {
      if (selected.zone === zone && selected.ri === ri && selected.ci === ci) {
        selected = null; renderBoard(); updateStatus(); return;
      }
      const a = seats[selected.zone][selected.ri][selected.ci];
      const b = seats[zone][ri][ci];
      seats[selected.zone][selected.ri][selected.ci] = b;
      seats[zone][ri][ci] = a;
      selected = null;
      renderBoard();
      setStatus('✅ 자리 교환 완료!');
    }
  }

  function onDragStart(zone, ri, ci) { dragSrc = { zone, ri, ci }; }

  function onDrop(zone, ri, ci) {
    if (!dragSrc) return;
    const a = seats[dragSrc.zone][dragSrc.ri][dragSrc.ci];
    const b = seats[zone][ri][ci];
    seats[dragSrc.zone][dragSrc.ri][dragSrc.ci] = b;
    seats[zone][ri][ci] = a;
    dragSrc = null; selected = null;
    renderBoard();
    setStatus('✅ 드래그로 자리 이동 완료!');
  }

  function renderAll() { renderSidebar(); renderBoard(); }

  function renderSidebar() {
    document.getElementById('count').textContent = students.length;
    document.getElementById('student-list').innerHTML =
      students.map((name, idx) => `
        <div class="chip">
          <span>${esc(name)}</span>
          <span class="chip-del" onclick="removeStudent(${idx})">×</span>
        </div>`).join('');
    updateStatus();
  }

  function renderBoard() {
    const wrapper = document.getElementById('zones-wrapper');
    wrapper.innerHTML = '';

    ['left', 'center', 'right'].forEach(zone => {
      const zoneEl = document.createElement('div');
      zoneEl.className = 'zone';
      const maxCols = Math.max(...zoneConfig[zone]);

      seats[zone].forEach((row, ri) => {
        const rowEl = document.createElement('div');
        rowEl.className = 'seat-row';

        for (let s = 0; s < maxCols - row.length; s++) {
          const spacer = document.createElement('div');
          spacer.style.cssText = 'width:66px;height:36px;flex-shrink:0;';
          rowEl.appendChild(spacer);
        }

        row.forEach((name, ci) => {
          const isSel = selected &&
            selected.zone === zone && selected.ri === ri && selected.ci === ci;
          const el = document.createElement('div');
          el.className = 'seat' + (name ? '' : ' empty') + (isSel ? ' selected' : '');
          el.textContent = name || '';
          el.title = name || '빈자리';
          el.draggable = !!name;
          el.addEventListener('click',     ()  => seatClick(zone, ri, ci));
          el.addEventListener('dragstart', ()  => onDragStart(zone, ri, ci));
          el.addEventListener('dragover',  e   => { e.preventDefault(); el.classList.add('drag-over'); });
          el.addEventListener('dragleave', ()  => el.classList.remove('drag-over'));
          el.addEventListener('drop',      e   => { e.preventDefault(); el.classList.remove('drag-over'); onDrop(zone, ri, ci); });
          rowEl.appendChild(el);
        });

        zoneEl.appendChild(rowEl);
      });

      wrapper.appendChild(zoneEl);
    });

    updateStatus();
  }

  function updateStatus() {
    const filled = ['left', 'center', 'right']
      .flatMap(z => seats[z].flatMap(r => r))
      .filter(Boolean).length;
    setStatus(`전체 30석 · ${filled}명 배치됨 · 학생 ${students.length}명 등록`);
  }

  function setStatus(msg) { document.getElementById('status').textContent = msg; }

  function esc(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  init();
</script>
</body>
</html>
