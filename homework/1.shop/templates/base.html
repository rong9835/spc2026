<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Flask Shop{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .navbar-brand {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.5px;
      }
      main {
        flex: 1;
        padding: 2rem 0;
      }
      footer {
        background-color: #212529;
        color: #adb5bd;
        text-align: center;
        padding: 1.5rem 0;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand text-warning" href="/">
          <i class="bi bi-bag-heart-fill me-1"></i>Flask Shop
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto gap-1">
            <li class="nav-item">
              <a class="nav-link" href="/"><i class="bi bi-house-fill me-1"></i>홈</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/list"><i class="bi bi-grid-fill me-1"></i>상품</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/cart"><i class="bi bi-cart-fill me-1"></i>장바구니</a>
            </li>
            {% if session.get('user') %}
            <li class="nav-item d-flex align-items-center ms-2">
              <span class="text-white-50 small me-2">
                <i class="bi bi-person-check-fill text-warning me-1"></i>{{ session['user']['name'] }}님
              </span>
              <a class="btn btn-outline-warning btn-sm fw-bold" href="/logout">
                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
              </a>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="btn btn-warning btn-sm ms-2 fw-bold" href="/login">
                <i class="bi bi-person-fill me-1"></i>로그인
              </a>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <main>
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    <footer>
      <i class="bi bi-bag-heart me-1"></i>© 2026 Flask Shop. All rights reserved.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
