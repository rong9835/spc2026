{% extends 'base.html' %}
{% block title %}로그인{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5 col-sm-8">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-person-circle text-warning" style="font-size: 3rem;"></i>
          <h3 class="fw-bold mt-2">로그인</h3>
          <p class="text-muted small">계정에 로그인 해주세요</p>
        </div>

        {% if error %}
        <div class="alert alert-danger d-flex align-items-center gap-2 rounded-3" role="alert">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">아이디</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input
                type="text"
                name="id"
                class="form-control border-start-0 ps-0"
                placeholder="아이디를 입력하세요"
                required
              />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">비밀번호</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input
                type="password"
                name="pw"
                class="form-control border-start-0 ps-0"
                placeholder="비밀번호를 입력하세요"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-warning w-100 fw-bold py-2 rounded-3">
            <i class="bi bi-box-arrow-in-right me-1"></i>로그인
          </button>
        </form>

        <div class="text-center mt-4 text-muted small">
          <p class="mb-1">테스트 계정: alice / alice</p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
