<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        list-style-type: none;
        margin: 0;
        padding: 0;
        border: 1px solid #555;
        display: flex;
      }
      li {
        flex: 1;
        width: 100px;
        text-align: center;
      }

      li a {
        text-decoration: none;
        display: block;
      }
      li a:hover {
        background-color: #555;
        color: white;
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a href="#">home</a></li>
      <li><a href="#">news</a></li>
      <li><a href="#">contant</a></li>
      <li><a href="#">about</a></li>
    </ul>
  </body>
</html>
