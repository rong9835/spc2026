<!doctype html>
<html lang="en">
  <head>

        height: 100px;
        color: white;
        background-color: orange;
        margin: 5px;
      }
      .location {
        background-color: orangered;
        position: relative;
        /* relative 상대적, apsolute 절대적 */

        left: 50px;
      }

      .image-text {
        position: relative;
        top: 50px;
        left: 50px;
      }
    </style>
  </head>
  <body>
    <div>1</div>

    <div>3</div>
    <div class="image"><p class="image-text">고양이</p></div>
