<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <title>Document</title>
    <style>
      body {
        height: 2000px;
        padding: 50px;
      }
      .box {
        margin: 100px 0;
        padding: 40px;
        background-color: #ffc7c7;
        border: 2px solid #ff7373;
        text-align: center;
        font-size: 24px;
      }
    </style>
  </head>
  <body>
    <h1>스크롤 하면서 등장하는 요소들</h1>
    <div class="box" data-aos="fade-up">첫번째 박스</div>
    <div class="box" data-aos="fade-fight">첫번째 박스</div>
    <div class="box" data-aos="zoom-in">첫번째 박스</div>
  </body>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</html>
