<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-zinc-100 to-zinc-200"
  >
    <div
      class="w-[35vw] min-w-[300px] max-w-[480px] bg-white rounded-2xl px-10 py-12"
      style="
        box-shadow:
          12px 12px 40px rgba(0, 0, 0, 0.45),
          20px 20px 60px rgba(0, 0, 0, 0.25);
      "
    >
      <!-- 헤더 -->
      <div class="mb-8">
        <h2 class="text-2xl font-semibold text-zinc-800 tracking-tight">
          로그인
        </h2>
        <p class="text-sm text-zinc-400 mt-1">계정에 접속하세요</p>
      </div>

      <!-- 폼 -->
      <div class="space-y-5">
        <!-- Username -->
        <div class="space-y-1.5">
          <label
            class="text-xs font-medium text-zinc-500 uppercase tracking-widest"
            >Username</label
          >
          <input
            type="text"
            placeholder="아이디를 입력하세요"
            class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-zinc-50 text-zinc-800 text-sm placeholder-zinc-300 outline-none focus:border-zinc-800 focus:bg-white focus:ring-2 focus:ring-zinc-900/10 transition-all duration-200"
          />
        </div>

        <!-- Password -->
        <div class="space-y-1.5">
          <label
            class="text-xs font-medium text-zinc-500 uppercase tracking-widest"
            >Password</label
          >
          <input
            type="password"
            placeholder="비밀번호를 입력하세요"
            class="w-full px-4 py-3 rounded-xl border border-zinc-200 bg-zinc-50 text-zinc-800 text-sm placeholder-zinc-300 outline-none focus:border-zinc-800 focus:bg-white focus:ring-2 focus:ring-zinc-900/10 transition-all duration-200"
          />
        </div>

        <!-- 옵션 -->
        <div class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="checkbox"
              class="w-4 h-4 rounded border-zinc-300 accent-zinc-800"
            />
            <span class="text-xs text-zinc-400">로그인 상태 유지</span>
          </label>
          <a
            href="#"
            class="text-xs text-zinc-400 hover:text-zinc-700 transition-colors"
            >비밀번호 찾기</a
          >
        </div>

        <!-- 로그인 버튼 -->
        <button
          class="w-full mt-2 py-3 rounded-xl bg-zinc-900 text-white text-sm font-medium tracking-wide hover:bg-zinc-700 active:scale-[0.98] transition-all duration-150"
          style="box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.35)"
        >
          로그인
        </button>
      </div>

      <!-- 회원가입 링크 -->
      <p class="text-center text-xs text-zinc-400 mt-6">
        계정이 없으신가요?
        <a href="#" class="text-zinc-700 font-medium hover:underline"
          >회원가입</a
        >
      </p>
    </div>
  </body>
</html>
