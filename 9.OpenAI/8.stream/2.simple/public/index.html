<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스트림 채팅</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f1f5f9;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 700px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            flex-shrink: 0;
            background: #2563eb;
            color: white;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.7;
            word-break: break-word;
        }

        .user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            align-self: flex-start;
            background: white;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            flex-shrink: 0;
            display: flex;
            padding: 16px;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        #input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            outline: none;
        }

        #input:focus {
            border-color: #2563eb;
        }

        #send {
            border: none;
            background: #2563eb;
            color: white;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        #send:hover {
            background: #1d4ed8;
        }

        .highlight-line {
            display: inline-block;
            background: #dbeafe;
            color: #1e3a8a;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 8px;
            margin: 2px 0;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">스트림 채팅</div>

        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="input" placeholder="메시지를 입력하세요..." />

            <button id="send">전송</button>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const chat = document.getElementById('chat');

        function formatMessage(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<span class="highlight-line">$1</span>');
        }

        async function sendMessage() {
            const message = input.value.trim();

            if (!message) return;

            const userDiv = document.createElement('div');

            userDiv.className = 'message user';
            userDiv.textContent = message;

            chat.appendChild(userDiv);

            chat.scrollTop = chat.scrollHeight;

            input.value = '';

            const botDiv = document.createElement('div');

            botDiv.className = 'message bot';

            chat.appendChild(botDiv);

            chat.scrollTop = chat.scrollHeight;

            const response = await fetch('/stream', {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json',
                },

                body: JSON.stringify({
                    message,
                }),
            });

            const reader = response.body.getReader();

            const decoder = new TextDecoder();

            let fullText = '';

            while (true) {
                const { done, value } = await reader.read();

                if (done) break;

                const chunk = decoder.decode(value, {
                    stream: true,
                });

                fullText += chunk;

                botDiv.innerHTML = formatMessage(fullText).replace(/\n/g, '<br>');

                chat.scrollTop = chat.scrollHeight;
            }
        }

        send.addEventListener('click', sendMessage);

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
