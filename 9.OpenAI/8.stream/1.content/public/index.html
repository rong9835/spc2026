<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>스트림 채팅</h1>
    <input type="text" id="input" placeholder="메시지를 입력하시오">
    <button id="send">전송</button>
    <div id="chat"><!-- 응답을 출력할 곳--></div>
    <script>
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const chat = document.getElementById('chat');

        send.addEventListener('click', async () => {
            const message = input.value.trim();

            const response = await fetch('/stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message})
            });

            // const data = await response.json(); // 우리가 알던 응답
            // 지금부터는 이게 아니고 event-stream 으로 오는걸 data: <내용> \n\n
            const reader = response.body.getReader(); 
            const decoder = new TextDecoder();
            let fullText = '';
            
            while (true) {
                const { done, value } = await reader.read();  // [DONE]
                if (done) break;
                // console.log('읽은데이터: ', done, value);

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n')

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6);
                        if (data === '[DONE]') continue;
                        try {
                            const parsed = JSON.parse(data);
                            console.log(parsed)
                            if (parsed.content) {
                                fullText += parsed.content;
                                chat.innerHTML = fullText;
                            }
                        } catch (e) {} // 에러처리 생략
                    }
                }
            }
        })
    </script>
</body>
</html>
